# Cloudflare Pages 项目：docs.relay.tech（生产环境，命名统一加 -pro 后缀，
# 为未来拆分 test/pro 等多环境预留命名空间）
# 静态站点（VitePress 构建产物：docs/.vitepress/dist）+ Pages Functions（登录 / 编辑 API）
name                   = "docs-pro"
pages_build_output_dir = "docs/.vitepress/dist"
compatibility_date     = "2024-12-01"
compatibility_flags    = ["nodejs_compat"]

# ── Public configuration (non-secret) ──────────────────────────────────
[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAADhF0CGG3B1_Wlkv"
# 源仓库映射（key 需与 site/docs/<key>/ 镜像目录一致），JSON 字符串
SOURCE_REPOS = "{\"account\":\"helloworld2025/account\",\"relay\":\"helloworld2025/relay\",\"analytics\":\"helloworld2025/analytics\",\"general\":\"helloworld2025/docs\"}"

# ── D1 database (admin_users) ──────────────────────────────────────────
[[d1_databases]]
binding        = "DB"
database_name  = "docs-pro"
database_id    = "d44924be-8d84-431d-90e2-ac22cc9c0017"
migrations_dir = "migrations"

# Secrets (set via `wrangler pages secret put <NAME> --project-name docs-pro`), NOT stored here:
#   ADMIN_JWT_SECRET   - HS256 签名密钥，生成方式：openssl rand -base64 48
#   TURNSTILE_SECRET   - Cloudflare Turnstile 后端 secret key
#   GITHUB_TOKEN       - 具备 account/relay/analytics/docs 四仓库 contents 读写权限的
#                        GitHub Fine-grained Personal Access Token（编辑器保存文件用）
